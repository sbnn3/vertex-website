    <path d="M18 6 L44 32 L70 6" stroke="#10B981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <!-- Nodes -->
    <circle cx="18" cy="6" r="6" fill="#0B63F6"/>
    <circle cx="70" cy="6" r="6" fill="#0B63F6"/>
    <circle cx="44" cy="58" r="6" fill="#10B981"/>
    <circle cx="44" cy="32" r="5" fill="#111827" opacity="0.75"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(92,10)">
    <text x="0" y="38" font-size="34" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800" fill="#111827">
      Vertex
