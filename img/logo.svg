<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 260" role="img" aria-label="Vertex Automation">
  <defs>
    <linearGradient id="vxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B63F6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>

    <linearGradient id="vxBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A2F66"/>
      <stop offset="1" stop-color="#0B63F6"/>
    </linearGradient>

    <style>
      .word { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    </style>
  </defs>

  <!-- MARK -->
  <g transform="translate(30,22)">
    <!-- V stroke -->
    <path d="M72 50 L138 196 L206 50"
          fill="none"
          stroke="url(#vxBlue)"
          stroke-width="26"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- inner highlight -->
    <path d="M95 62 L138 160 L182 62"
          fill="none"
          stroke="url(#vxGrad)"
          stroke-width="10"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.95"/>

    <!-- automation nodes -->
    <circle cx="72" cy="50" r="10" fill="#0B63F6"/>
    <circle cx="206" cy="50" r="10" fill="#10B981"/>
    <circle cx="138" cy="196" r="10" fill="#0A2F66"/>

    <!-- micro connector hints -->
    <path d="M82 55 L110 80" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M196 55 L168 80" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(300,0)">
    <!-- VERTEX -->
    <text class="word" x="0" y="142"
          font-size="112"
          font-weight="900"
          letter-spacing="1"
          fill="#0A2F66">VERTEX</text>

    <!-- AUTOMATION (centered under VERTEX) -->
    <!-- This value is tuned to sit centered under the VERTEX word visually -->
    <g transform="translate(230,0)">
      <text class="word"
            x="0" y="205"
            text-anchor="middle"
            font-size="40"
            font-weight="700"
            letter-spacing="8"
            fill="#64748B">AUTOMATION</text>
    </g>
  </g>
</svg>
