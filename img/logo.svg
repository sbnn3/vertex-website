<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Vertex Construction Automation">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b63f6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- ICON (tight) -->
  <g transform="translate(0,10)">
    <path d="M20 10 L70 100 L120 10" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 10 L70 55 L120 10" fill="none" stroke="#10b981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="20" cy="10" r="9" fill="#0b63f6"/>
    <circle cx="120" cy="10" r="9" fill="#0b63f6"/>
    <circle cx="70" cy="100" r="9" fill="#10b981"/>
  </g>

  <!-- TEXT (big + readable) -->
  <g transform="translate(150,18)">
    <text x="0" y="56" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="58" font-weight="900" fill="#0f172a">Vertex</text>
    <text x="0" y="94" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="22" font-weight="700" fill="#475569">Construction Automation</text>
  </g>
</svg>
